<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Parking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;

  background: radial-gradient(circle at top left, #60a5fa, transparent 50%),
              radial-gradient(circle at bottom right, #a78bfa, transparent 50%),
              linear-gradient(135deg, #0f172a, #1e293b);

  overflow-x: hidden;
  color: white;
}

body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(255,255,255,0.08);
  filter: blur(120px);
  top: -120px;
  left: -120px;
  z-index: 0;
}

.header {
  text-align: center;
  padding-top: 30px;
  position: relative;
  z-index: 1;
}

.header h1 {
  font-weight: bold;
  background: linear-gradient(90deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.auth-card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius: 20px;
  padding: 35px;
  border: 1px solid rgba(255,255,255,0.2);
}

.form-control {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  border-radius: 12px;
}

.btn-custom {
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  border: none;
  color: white;
  border-radius: 12px;
}

a { color: rgba(255,255,255,0.7); }
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Smart Parking System</h1>
    <p>Login to continue</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="auth-card">

        <h4 class="text-center mb-3">Login</h4>

        <form id="loginForm" autocomplete="off">
          <input type="text"
       id="phone"
       class="form-control mb-3"
       placeholder="Phone Number"
       autocomplete="off"
       required>
          <input type="password"
       id="password"
       class="form-control mb-3"
       placeholder="Password"
       autocomplete="new-password"
       required>

          <button class="btn btn-custom w-100">Login</button>
        </form>

        <p id="msg" class="text-center mt-2"></p>

        <hr>

        <div class="text-center">
          <a href="register.html">Register Vehicle</a>
        </div>

      </div>

    </div>
  </div>

</div>

<script>
document.getElementById("loginForm").onsubmit = async function(e){

  e.preventDefault();

  let data = {
    phone_number: document.getElementById("phone").value,
    password: document.getElementById("password").value
  };

  let res = await fetch("http://127.0.0.1:8000/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  let result = await res.json();

  if(result.user_id){

    document.getElementById("msg").innerHTML =
      "<span style='color:#4ade80'>✅ Welcome " + result.name + "</span>";

    localStorage.setItem("user_id", result.user_id);

    setTimeout(()=>{
      window.location.href = "dashboard.html";
    }, 1000);

  } else {

    document.getElementById("msg").innerHTML =
      "<span style='color:#ef4444'>❌ " + result.message + "</span>";
  }

};
</script>

</body>
</html>
