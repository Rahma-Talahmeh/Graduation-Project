<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suggested Spot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;

  background: radial-gradient(circle at top left, #60a5fa, transparent 50%),
              radial-gradient(circle at bottom right, #a78bfa, transparent 50%),
              linear-gradient(135deg, #0f172a, #1e293b);

  display: flex;
  align-items: center;
  justify-content: center;

  color: white;
  overflow: hidden;
}

/* glow */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(255,255,255,0.08);
  filter: blur(120px);
  top: -120px;
  left: -120px;
  z-index: 0;
}

/* CARD */
.card-box {
  position: relative;
  z-index: 1;

  width: 380px;
  padding: 30px;
  text-align: center;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 20px 40px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.2);

  animation: zoomIn 0.6s ease;
}

/* TITLE */
.card-box h4 {
  margin-bottom: 10px;

  background: linear-gradient(90deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* RESULT BOX */
#spot {
  font-size: 3rem;
  font-weight: bold;
  margin: 20px 0;

  color: #60a5fa;
  text-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* BUTTON */
.btn-custom {
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  border: none;
  color: white;
  font-weight: 500;
  border-radius: 12px;
  transition: 0.3s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.btn-custom:hover {
  transform: scale(1.05);
}

/* ANIMATION */
@keyframes zoomIn {
  from {transform: scale(0.8); opacity:0;}
  to {transform: scale(1); opacity:1;}
}
</style>
</head>

<body>

<div class="card-box">

  <h4><i class="fa-solid fa-location-dot"></i> Suggested Parking</h4>

  <div id="spot">--</div>

  <button onclick="generate()" class="btn btn-custom mt-2">
    Refresh Suggestion
  </button>

  <a href="dashboard.html" class="d-block mt-3">⬅ Back</a>

</div>

<script>
async function generate(){

  let res = await fetch("http://127.0.0.1:8000/suggest-spot");
  let data = await res.json();

  let spotBox = document.getElementById("spot");

  if(data.suggested_spot){
    spotBox.innerText = data.suggested_spot;
  } else {
    spotBox.innerText = "No Spots Available";
  }
}

window.onload = generate;

window.onload = generate;
</script>

</body>
</html>
