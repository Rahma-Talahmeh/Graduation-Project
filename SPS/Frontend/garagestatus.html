<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Garage Status</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;

  background: radial-gradient(circle at top left, #60a5fa, transparent 50%),
              radial-gradient(circle at bottom right, #a78bfa, transparent 50%),
              linear-gradient(135deg, #0f172a, #1e293b);

  color: white;
}

/* glass navbar */
.navbar {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

/* glass box */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.glass:hover {
  transform: translateY(-5px);
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-top: 40px;
}

/* spot */
.spot {
  text-align: center;
  font-weight: bold;
  border-radius: 15px;
  padding: 20px;
  color: white;
}

/* button */
.btn-custom {
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  border: none;
  color: white;
  font-weight: 500;
  border-radius: 12px;
  transition: 0.3s;
}

.btn-custom:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar p-3">
  <div class="container">
    <h5>🚗 Smart Parking - Garage Status</h5>
  </div>
</nav>

<!-- Content -->
<div class="container mt-5">

  <div class="glass text-center">
    <h3>Live Parking Status</h3>

    <div id="grid" class="grid"></div>

    <!-- 🔙 BACK BUTTON -->
    <a href="dashboard.html" class="btn btn-custom w-100 mt-4">
      ⬅ Back
    </a>

  </div>

</div>

<script>
const socket = new WebSocket("ws://127.0.0.1:8000/ws/spots");

socket.onmessage = (event) => {

  let data = JSON.parse(event.data);

  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(s => {

    let color = s.status === "available" ? "#22c55e" : "#ef4444";

    grid.innerHTML += `
      <div class="spot" style="background:${color}">
        Spot ${s.spot_number}<br>
        ${s.status}
      </div>
    `;
  });
};
</script>

</body>
</html>
