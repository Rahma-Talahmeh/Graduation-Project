<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;

  background: radial-gradient(circle at top left, #60a5fa, transparent 50%),
              radial-gradient(circle at bottom right, #a78bfa, transparent 50%),
              linear-gradient(135deg, #0f172a, #1e293b);

  display: flex;
  align-items: center;
  justify-content: center;

  color: white;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(255,255,255,0.08);
  filter: blur(120px);
  top: -120px;
  left: -120px;
  z-index: 0;
}

.form-card {
  position: relative;
  z-index: 1;
  width: 380px;
  padding: 30px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);

  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);

  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.form-card h3 {
  text-align: center;
  margin-bottom: 20px;

  background: linear-gradient(90deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.form-control {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  border-radius: 12px;
}

.form-control::placeholder {
  color: rgba(255,255,255,0.6);
}

.btn-custom {
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  border: none;
  color: white;
  border-radius: 12px;
}

a {
  color: rgba(255,255,255,0.7);
}
</style>
</head>

<body>

<div class="form-card">

  <h3>Register Vehicle</h3>

<form id="form" autocomplete="off">

    <input id="name" class="form-control mb-2" placeholder="Full Name" required>
    <input id="plate" class="form-control mb-2" placeholder="Plate Number" required>
    <input id="phone" class="form-control mb-2" placeholder="Phone Number" required>
    <select id="type" class="form-control mb-3" required>
     <option value="">Car Brand</option>
     <option value="Mercedes">Mercedes</option>
     <option value="BMW">BMW</option>
     <option value="Dodge">Dodge</option>
     <option value="Toyota">Toyota</option>
     <option value="Hyundai">Hyundai</option>
     <option value="Kia">Kia</option>
    </select>
<input class="form-control mb-2"
       id="password"
       type="password"
       placeholder="Password"
       autocomplete="new-password"
       required>
    <button class="btn btn-custom w-100">Register</button>

  </form>

  <p id="msg" class="text-center mt-2"></p>

  <div class="text-center mt-3">
    <a href="index.html">Already have an account? Login</a>
  </div>

</div>

<script>
document.getElementById("form").onsubmit = async function(e){

  e.preventDefault();

  document.getElementById("msg").innerHTML = "";

  // ================= GET VALUES =================
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let plate = document.getElementById("plate").value;
  let type = document.getElementById("type").value;
  let password = document.getElementById("password").value;

  // ================= VALIDATION =================

  // 👤 Name check
  if(name.length < 3){
    document.getElementById("msg").innerHTML =
      "<span style='color:red'>❌ Name must be at least 3 characters</span>";
    return;
  }

  // 📱 Phone check
  if (!/^07[0-9]{8}$/.test(phone)) {
    document.getElementById("msg").innerHTML =
      "<span style='color:red'>❌ Invalid phone number. Should be 07XXXXXXXX</span>";
    return;
  }

  // 🚗 Plate check
  if (!/^[0-9]{3,6}$/.test(plate)) {
    document.getElementById("msg").innerHTML =
      "<span style='color:red'>❌ Invalid plate number. Should be 3–6 digits</span>";
    return;
  }

  // 🚙 Car type check
  if(type === ""){
    document.getElementById("msg").innerHTML =
      "<span style='color:red'>❌ Please select a car brand</span>";
    return;
  }

  // 🔐 Password check
  if (password.length < 4) {
    document.getElementById("msg").innerHTML =
      "<span style='color:red'>❌ Password must be at least 4 characters</span>";
    return;
  }

  // ================= REGISTER USER =================
  let userData = {
    full_name: name,
    phone_number: phone,
    password: password
  };

  let res = await fetch("http://127.0.0.1:8000/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(userData)
  });

  let result = await res.json();

  if (!result.user_id) {
    document.getElementById("msg").innerHTML =
      "<span style='color:red'>" + result.message + "</span>";
    return;
  }

  let user_id = result.user_id;

  // ================= REGISTER VEHICLE =================
  let vehicleData = {
    user_id: user_id,
    plate_number: plate,
    vehicle_type: type,
    color: "white"
  };

  let res2 = await fetch("http://127.0.0.1:8000/add-vehicle", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(vehicleData)
  });

  let result2 = await res2.json();

  if (result2.message && result2.message.includes("exists")) {
    document.getElementById("msg").innerHTML =
      "<span style='color:#ef4444'>❌ Plate number already exists</span>";
    return;
  }

  // ================= SUCCESS =================
  document.getElementById("msg").innerHTML =
    "<span style='color:#4ade80'>✅ Registered Successfully</span>";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
};

</script>

</body>
</html>
