<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;

  background: radial-gradient(circle at top left, #60a5fa, transparent 50%),
              radial-gradient(circle at bottom right, #a78bfa, transparent 50%),
              linear-gradient(135deg, #0f172a, #1e293b);

  color: white;
  overflow-x: hidden;
}

/* background glow */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(255,255,255,0.08);
  filter: blur(120px);
  top: -120px;
  left: -120px;
  z-index: 0;
}

/* NAVBAR GLASS */
.navbar {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-bottom: 1px solid rgba(255,255,255,0.15);

  position: relative;
  z-index: 1;
}

.navbar h5 {
  color: white;
  margin: 0;
}

/* GLASS CARD */
.card-custom {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border-radius: 20px;
  padding: 25px;

  border: 1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 20px 40px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.2);

  transition: 0.3s;
  position: relative;
  z-index: 1;
}

.card-custom:hover {
  transform: translateY(-8px);
}

/* BUTTON */
.btn-custom {
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  border: none;
  color: white;
  font-weight: 500;
  border-radius: 12px;
  transition: 0.3s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.btn-custom:hover {
  transform: scale(1.05);
}

/* STATUS CARD */
#status {
  font-weight: bold;
  font-size: 1.8rem;
  background: linear-gradient(90deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ICON STYLE */
.card-custom i {
  color: #60a5fa;
}

/* ANIMATION */
.fade-in {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar p-3">
  <div class="container">
    <h5>🚗 Smart Parking</h5>
    <button onclick="logout()" class="btn btn-outline-light">
  Logout
</button>
  </div>
</nav>

<!-- Content -->
<div class="container mt-5 fade-in">

  <!-- Status -->
  <div class="card-custom text-center mb-4">
    <h3 id="status">Loading...</h3>
  </div>

  <!-- Features -->
  <div class="row text-center">

    <div class="col-md-4 mb-3">
      <div class="card-custom">
        <i class="fa fa-car fa-2x mb-3"></i>
        <h5>Find My Car</h5>
        <a href="findCar.html" class="btn btn-custom mt-2">Open</a>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card-custom">
        <i class="fa fa-search fa-2x mb-3"></i>
        <h5>Find Owner</h5>
        <a href="findOwner.html" class="btn btn-custom mt-2">Search</a>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card-custom">
        <i class="fa fa-map-marker-alt fa-2x mb-3"></i>
        <h5>Suggested Spot</h5>
        <button onclick="suggest()" class="btn btn-custom mt-2">Get Spot</button>
        <p id="spot" class="mt-3 text-success"></p>
      </div>
    </div>
 
    <div class="row justify-content-center mt-4">

  <div class="col-md-4">
    <div class="card-custom">
      <i class="fa fa-parking fa-2x mb-3"></i>
      <h5>Garage Status</h5>
      <p>Live view of all parking spots</p>
      <a href="garageStatus.html" class="btn btn-custom mt-2">
        Open
      </a>
    </div>
  </div>

</div>

  </div>

</div>

<script>
const socket = new WebSocket("ws://127.0.0.1:8000/ws/spots");

socket.onopen = () => {
  console.log("WS CONNECTED");
};

socket.onmessage = (event) => {

  let data = JSON.parse(event.data);

  let available = data.filter(
    s => s.status.toLowerCase() === "available"
  ).length;

  document.getElementById("status").textContent =
    "Available: " + available;
};
async function suggest() {
  try {
    let res = await fetch("http://127.0.0.1:8000/spots");
    let data = await res.json();

    let freeSpot = data.find(s => s.status === "available");

    let el = document.getElementById("spot");

    if (freeSpot) {
      el.innerText = "Suggested Spot: " + freeSpot.spot_number;
      el.innerHTML = `<span style="
      background:#00ff88;
      color:black;
      padding:5px 10px;
      border-radius:8px;
      font-weight:bold;
      box-shadow:0 0 10px rgba(0,255,136,0.6);
            ">
      Suggested Spot: ${freeSpot.spot_number}
</span>`;

    } else {
      el.innerText = "No available spots";
      el.style.color = "#ef4444";
    }

  } catch (err) {
    console.log(err);
  }
}
function logout() {

  localStorage.clear();
  sessionStorage.clear();

  window.location.href = "login.html";
}
</script>

</body>
</html>
